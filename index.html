<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <!-- Sécurité : tout est local. connect-src 'none' interdit au navigateur d'envoyer
       la moindre donnée sur le réseau, même en cas de code malveillant injecté. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coffre" />
  <title>Coffre — Mes finances</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon-64.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ÉCRAN DE VERROUILLAGE / CRÉATION DU CODE -->
  <section id="lock-screen" class="lock hidden">
    <div class="lock-inner">
      <div class="lock-logo" aria-hidden="true">
        <img src="icons/icon-192.png" width="96" height="96" alt="" class="lock-app-icon" />
      </div>
      <h1 class="lock-title">Coffre</h1>
      <p id="lock-subtitle" class="lock-subtitle">Entre ton code</p>

      <div class="pin-dots" id="pin-dots">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <p id="lock-error" class="lock-error"></p>

      <div class="keypad" id="keypad">
        <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
        <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
        <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
        <button class="key-ghost" data-k="reset">Effacer</button>
        <button data-k="0">0</button>
        <button class="key-ghost" data-k="del">⌫</button>
      </div>
    </div>
  </section>

  <!-- ÉCRAN DE DÉBLOCAGE (essai terminé) -->
  <section id="licence-gate" class="lock hidden">
    <div class="lock-inner">
      <div class="lock-logo" aria-hidden="true">
        <svg viewBox="0 0 100 100" width="64" height="64">
          <rect x="20" y="44" width="60" height="42" rx="8" fill="none" stroke="currentColor" stroke-width="6"/>
          <path d="M32 44 V32 a18 18 0 0 1 36 0 V44" fill="none" stroke="currentColor" stroke-width="6"/>
          <circle cx="50" cy="63" r="6" fill="currentColor"/>
        </svg>
      </div>
      <h1 class="lock-title">Essai terminé</h1>
      <p class="lock-subtitle">Débloque la version à vie pour continuer — 15 €</p>
      <p class="lic-id">Saisis ton e-mail d'achat et ta clé (valable sur tous tes appareils, même après réinstallation)</p>
      <input id="lic-email" class="lic-input" type="email" placeholder="Ton e-mail d'achat" autocomplete="email" autocapitalize="off" spellcheck="false" style="margin-bottom:10px" />
      <input id="lic-key" class="lic-input" type="text" placeholder="Colle ta clé de licence ici" autocomplete="off" />
      <button id="lic-validate" class="btn">Débloquer</button>
      <p id="lic-error" class="lock-error"></p>
      <button id="lic-lock" class="btn btn-2" style="margin-top:10px">Verrouiller</button>
    </div>
  </section>

  <!-- APPLICATION -->
  <div id="app" class="app hidden">
    <main id="view" class="view"><!-- rendu par JS --></main>

    <nav class="tabbar" id="tabbar">
      <button data-tab="dashboard" class="tab active">
        <span class="tab-ico">🏠</span><span class="tab-lbl">Accueil</span>
      </button>
      <button data-tab="tx" class="tab">
        <span class="tab-ico">📝</span><span class="tab-lbl">Opérations</span>
      </button>
      <button data-tab="add" class="tab tab-add" aria-label="Ajouter">
        <span class="tab-add-btn">＋</span>
      </button>
      <button data-tab="budgets" class="tab">
        <span class="tab-ico">📊</span><span class="tab-lbl">Budgets</span>
      </button>
      <button data-tab="abos" class="tab">
        <span class="tab-ico">🎯</span><span class="tab-lbl">Abos</span>
      </button>
      <button data-tab="settings" class="tab">
        <span class="tab-ico">⚙️</span><span class="tab-lbl">Réglages</span>
      </button>
    </nav>
  </div>

  <!-- FEUILLE MODALE (ajout / édition) -->
  <div id="sheet-backdrop" class="sheet-backdrop hidden"></div>
  <div id="sheet" class="sheet hidden" role="dialog" aria-modal="true"></div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="vendor/xlsx.full.min.js"></script>
  <script src="vendor/pdf.min.js"></script>
  <script src="app.js"></script>
  <script src="install-pwa.js" data-app-name="Coffre" data-accent="#6d7cff"></script>
</body>
</html>
